<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu ngày rèn luyện - Học Viện Hàng Không Việt Nam</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 380px; 
        }
        h2 { color: #2c3e50; font-size: 20px; margin-bottom: 5px; font-weight: bold;}
        .subtitle { color: #7f8c8d; font-size: 13px; margin-bottom: 25px; text-transform: uppercase;}
        #clock { position: absolute; top: 20px; right: 20px; font-size: 14px; color: #ffffff; background: rgba(0, 0, 0, 0.2); padding: 10px 15px; border-radius: 8px; text-align: right;}
        .status-text { font-size: 12px; margin-bottom: 15px; color: #27ae60; font-weight: 500;}
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; font-size: 15px; text-align: center; outline: none;}
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;}
        button:hover { background: #1a252f; }
        .result-box { margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px; border-left: 5px solid #2c3e50; text-align: left; display: none;}
        .result-item { margin-bottom: 8px; font-size: 15px; color: #334155;}
        .result-item strong { color: #1e293b; display: inline-block; width: 100px;}
        .nrl-highlight { color: #e67e22; font-weight: bold; font-size: 16px;}
    </style>
</head>
<body>
    <div id="clock">Đang tải...</div>

    <div class="card">
        <h2>Tra cứu ngày rèn luyện</h2>
        <div class="subtitle">Học Viện Hàng Không Việt Nam</div>
        <div class="status-text" id="statusLabel">⏳ Đang đồng bộ dữ liệu...</div>

        <input type="text" id="mssvInput" placeholder="Nhập mã số sinh viên (MSSV)" disabled>
        <button id="submitBtn" onclick="traCuu()" disabled>Tra cứu</button>

        <div class="result-box" id="resultBox">
            <div class="result-item"><strong>Họ và Tên:</strong> <span id="lblNghe"></span></div>
            <div class="result-item"><strong>Lớp:</strong> <span id="lblLop"></span></div>
            <div class="result-item"><strong>MSSV:</strong> <span id="lblMssv"></span></div>
            <div class="result-item"><strong>Tổng Số NRL:</strong> <span id="lblNrl" class="nrl-highlight"></span> ngày</div>
        </div>
    </div>

    <script>
        // ⚠️ DÁN CÁC ĐƯỜNG LINK FILE GOOGLE SHEETS CỦA BẠN VÀO ĐÂY (CÁCH NHAU BẰNG DẤU PHẨY)
        const sheetUrls = [
            "https://docs.google.com/spreadsheets/d/1aIklaHtCE058mTqq8xtohYRfsB5TudukgyREXrMmktQ/export?format=csv", // Link file 1
            "https://docs.google.com/spreadsheets/d/1YjpqmyouRj3E7Opi2_bO2Mn7s0crY5bcLJUjo7Lo8jY/export?format=csv",  // Thử nghiệm copy 2 lần chính link này để test tính năng cộng dồn
        ]; 

        let dataset = [];

        function loadDataFromSheets() {
            let loadedCount = 0;
            dataset = []; 
            document.getElementById('statusLabel').innerText = "⏳ Đang kết nối mạng tới Google Sheets...";

            sheetUrls.forEach(url => {
                Papa.parse(url, {
                    download: true,
                    header: false,
                    complete: function(results) {
                        const rows = results.data;
                        
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            // Cột 3 (D) phải có MSSV
                            if (row.length >= 5 && row[3]) { 
                                const currentMssv = row[3].replace(/"/g, '').trim
