<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu ngày rèn luyện - Học Viện Hàng Không Việt Nam</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            margin: 0; 
            padding: 20px 0;
            box-sizing: border-box;
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 420px; 
        }
        h2 { color: #2c3e50; font-size: 20px; margin-bottom: 5px; font-weight: bold;}
        .subtitle { color: #7f8c8d; font-size: 13px; margin-bottom: 25px; text-transform: uppercase;}
        #clock { position: absolute; top: 20px; right: 20px; font-size: 14px; color: #ffffff; background: rgba(0, 0, 0, 0.2); padding: 10px 15px; border-radius: 8px; text-align: right;}
        .status-text { font-size: 12px; margin-bottom: 15px; color: #e67e22; font-weight: 500;}
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; font-size: 15px; text-align: center; outline: none;}
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;}
        button:hover { background: #1a252f; }
        .result-box { margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px; border-left: 5px solid #2c3e50; text-align: left; display: none;}
        .result-item { margin-bottom: 8px; font-size: 15px; color: #334155;}
        .result-item strong { color: #1e293b; display: inline-block; width: 110px;}
        .nrl-highlight { color: #e67e22; font-weight: bold; font-size: 18px;}
        .target-text { color: #64748b; font-size: 14px; font-weight: normal;}
        
        /* Style cho bảng chi tiết hoạt động */
        .activity-section { margin-top: 15px; border-top: 1px dashed #cbd5e1; padding-top: 15px; }
        .activity-title { font-size: 14px; font-weight: bold; color: #475569; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .activity-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .activity-table th { background-color: #f1f5f9; color: #475569; padding: 8px; font-weight: 600; }
        .activity-table td { padding: 8px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .activity-table td.score-col { text-align: right; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>
    <div id="clock">Đang tải...</div>

    <div class="card">
        <h2>Tra cứu ngày rèn luyện</h2>
        <div class="subtitle">Học Viện Hàng Không Việt Nam</div>
        <div class="status-text" id="statusLabel">⏳ Đang đồng bộ dữ liệu trực tuyến...</div>

        <input type="text" id="mssvInput" placeholder="Nhập mã số sinh viên (MSSV)" disabled>
        <button id="submitBtn" onclick="traCuu()" disabled>Tra cứu</button>

        <div class="result-box" id="resultBox">
            <div class="result-item"><strong>Họ và Tên:</strong> <span id="lblNghe"></span></div>
            <div class="result-item"><strong>Lớp:</strong> <span id="lblLop"></span></div>
            <div class="result-item"><strong>MSSV:</strong> <span id="lblMssv"></span></div>
            <div class="result-item"><strong>Tổng Số NRL:</strong> <span id="lblNrl" class="nrl-highlight"></span> <span class="target-text">/ 10 ngày</span></div>
            
            <div class="activity-section">
                <div class="activity-title">🏆 Chi tiết các hoạt động tham gia</div>
                <table class="activity-table">
                    <thead>
                        <tr>
                            <th>Tên hoạt động</th>
                            <th style="text-align: right; width: 80px;">Số ngày</th>
                        </tr>
                    </thead>
                    <tbody id="activityList">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ Dán đường link Web app Apps Script của bạn vào giữa hai dấu ngoặc kép dưới đây
        var apiUrl = "https://script.google.com/macros/s/AKfycbxjM6xrquUYa0K9ZcIYnMY2h1t99GuQveAkaodzdA7-at2ijTPCktzsDf5N4fo1lf4R2w/exec"; 

        var dataset = [];

        async function loadDataFromSheets() {
            try {
                var response = await fetch(apiUrl);
                dataset = await response.json();
                
                if(dataset.length > 0) {
                    document.getElementById('statusLabel').innerText = "✅ Đã đồng bộ thành công!";
                    document.getElementById('statusLabel').style.color = '#27ae60';
                    document.getElementById('mssvInput').disabled = false;
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    document.getElementById('statusLabel').innerText = "⚠️ Dữ liệu trống!";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('statusLabel').innerText = "❌ Lỗi cấu hình link API!";
                document.getElementById('statusLabel').style.color = '#c0392b';
            }
        }

        function traCuu() {
            var inputMssv = document.getElementById('mssvInput').value.trim();
            var resultBox = document.getElementById('resultBox');
            
            // 1. Kiểm tra nếu bỏ trống ô nhập liệu
            if (!inputMssv) { 
                alert("Vui lòng nhập MSSV trước!"); 
                return; 
            }
            
            // 2. 🌟 TÍNH NĂNG MỚI: Kiểm tra xem có chứa ký tự đặc biệt hoặc chữ cái không bằng Regex
            // Chỉ cho phép các chữ số từ 0-9
            var checkNumber = /^[0-9]+$/;
            if (!checkNumber.test(inputMssv)) {
                alert("❌ MSSV không hợp lệ! Vui lòng chỉ nhập các chữ số (Không chứa chữ cái hoặc ký tự đặc biệt).");
                resultBox.style.display = 'none';
                return;
            }
            
            var sinhVien = dataset.find(function(sv) {
                return sv.mssv.toLowerCase() === inputMssv.toLowerCase();
            });

            if (sinhVien) {
                document.getElementById('lblNghe').innerText = sinhVien.name;
                document.getElementById('lblLop').innerText = sinhVien.class;
                document.getElementById('lblMssv').innerText = sinhVien.mssv;
                
                // Hiển thị số ngày rèn luyện
                document.getElementById('lblNrl').innerText = sinhVien.nrl; 
                
                // In danh sách hoạt động ra bảng
                var activityTableBody = document.getElementById('activityList');
                activityTableBody.innerHTML = ""; 
                
                if (sinhVien.activities && sinhVien.activities.length > 0) {
                    sinhVien.activities.forEach(function(act) {
                        var rowHtml = `<tr>
                            <td>${act.name}</td>
                            <td class="score-col">+${act.score}</td>
                        </tr>`;
                        activityTableBody.innerHTML += rowHtml;
                    });
                } else {
                    activityTableBody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#94a3b8;">Không có chi tiết hoạt động</td></tr>`;
                }

                resultBox.style.display = 'block';
            } else {
                resultBox.style.display = 'none';
                alert("Không tìm thấy sinh viên có MSSV: " + inputMssv);
            }
        }

        document.getElementById('mssvInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !this.disabled) traCuu();
        });

        function updateClock() {
            var now = new Date();
            document.getElementById('clock').innerHTML = now.toLocaleDateString('vi-VN') + "<br>" + now.toLocaleTimeString('vi-VN');
        }
        setInterval(updateClock, 1000);
        updateClock();
        loadDataFromSheets();
    </script>
</body>
</html>
